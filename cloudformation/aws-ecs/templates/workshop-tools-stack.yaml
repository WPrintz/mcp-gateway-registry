AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MCP Gateway Registry - Workshop Tools Stack
  Deploys load generator (EC2 generating traffic through CloudFront) and
  Code Editor IDE (web-based IDE with Claude Code, Kiro CLI, and Bedrock access).

Parameters:
  EnvironmentName:
    Type: String
    Default: mcp-gateway

  TemplateS3Bucket:
    Type: String
    Description: S3 bucket containing templates and scripts

  TemplateS3Prefix:
    Type: String
    Description: S3 prefix (e.g. abc123/assets/) — static files at ../static/

  RegistryUrl:
    Type: String
    Description: Public MCP Gateway URL (CloudFront HTTPS)

  KeycloakCloudFrontUrl:
    Type: String
    Description: Public Keycloak URL (CloudFront HTTPS)

  PublicSubnets:
    Type: CommaDelimitedList
    Description: Public subnet IDs for EC2 placement

  VpcId:
    Type: String
    Description: VPC ID for security groups

  LoadGeneratorInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small]

  LoadRate:
    Type: String
    Default: '2'
    Description: Requests per second

  SshCidr:
    Type: String
    Default: ''
    Description: CIDR for SSH access (leave empty to disable SSH)

  # Code Editor Parameters
  CodeEditorUser:
    Type: String
    Description: Username for Code Editor
    Default: participant

  CodeEditorInstanceType:
    Type: String
    Description: Code Editor EC2 instance type
    Default: t3.medium

  CodeEditorVolumeSize:
    Type: Number
    Description: Code Editor EC2 instance volume size in GB
    Default: 40

  HomeFolder:
    Type: String
    Description: Folder to open in Code Editor
    Default: /workshop

Conditions:
  EnableSsh: !Not [!Equals [!Ref SshCidr, '']]

Mappings:
  AWSRegionsPrefixListID:
    ap-northeast-1:
      PrefixList: pl-58a04531
    ap-northeast-2:
      PrefixList: pl-22a6434b
    ap-south-1:
      PrefixList: pl-9aa247f3
    ap-southeast-1:
      PrefixList: pl-31a34658
    ap-southeast-2:
      PrefixList: pl-b8a742d1
    ca-central-1:
      PrefixList: pl-38a64351
    eu-central-1:
      PrefixList: pl-a3a144ca
    eu-north-1:
      PrefixList: pl-fab65393
    eu-west-1:
      PrefixList: pl-4fa04526
    eu-west-2:
      PrefixList: pl-93a247fa
    eu-west-3:
      PrefixList: pl-75b1541c
    sa-east-1:
      PrefixList: pl-5da64334
    us-east-1:
      PrefixList: pl-3b927c52
    us-east-2:
      PrefixList: pl-b6a144df
    us-west-1:
      PrefixList: pl-4ea04527
    us-west-2:
      PrefixList: pl-82a045eb

Resources:

  #============================================================================
  # SERVICE NETWORK HEALTH CHECK
  # Validates ECS Service Connect networking is operational by polling the
  # built-in airegistry-tools server (auto-registered on startup) until it
  # reports discovered tools. This confirms the registry container can reach
  # backend MCP servers via Service Connect hostname resolution.
  #============================================================================
  ServiceNetworkHealthLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-svc-network-health-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: ${EnvironmentName}-KeycloakM2MClientSecretArn

  ServiceNetworkHealthLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-svc-network-health
      Description: >-
        Validate Service Connect networking by checking airegistry-tools
        has discovered tools (confirms registry can reach backend MCP servers)
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ServiceNetworkHealthLambdaRole.Arn
      Timeout: 600
      MemorySize: 128
      Code:
        ZipFile: |
          """
          Service Network Health Check Lambda.
          Polls the registry API for airegistry-tools tool discovery as a
          proxy for Service Connect readiness. Triggers refresh to retry
          health checks when tools are not yet discovered.
          """
          import json
          import urllib.request
          import urllib.parse
          import urllib.error
          import ssl
          import boto3
          import cfnresponse
          import time

          def get_m2m_token(keycloak_url, client_id, client_secret):
              """Get M2M access token from Keycloak."""
              url = f"{keycloak_url}/realms/mcp-gateway/protocol/openid-connect/token"
              data = urllib.parse.urlencode({
                  'grant_type': 'client_credentials',
                  'client_id': client_id,
                  'client_secret': client_secret
              }).encode('utf-8')
              req = urllib.request.Request(url, data=data, method='POST')
              req.add_header('Content-Type', 'application/x-www-form-urlencoded')
              ctx = ssl.create_default_context()
              with urllib.request.urlopen(req, context=ctx, timeout=30) as response:
                  result = json.loads(response.read().decode('utf-8'))
                  return result.get('access_token')

          def get_server_tools(registry_url, token, server_path):
              """Get the current tool list for a server."""
              path = server_path.strip('/')
              url = f"{registry_url}/api/servers/tools/{path}"
              req = urllib.request.Request(url, method='GET')
              req.add_header('Authorization', f'Bearer {token}')
              ctx = ssl.create_default_context()
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=30) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      if isinstance(result, dict):
                          return result.get('tools', [])
                      elif isinstance(result, list):
                          return result
                      return []
              except Exception as e:
                  print(f"  get_server_tools error: {e}")
                  return []

          def handler(event, context):
              """CloudFormation Custom Resource handler."""
              print(f"Event: {json.dumps(event)}")
              request_type = event.get('RequestType')

              if request_type == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              properties = event.get('ResourceProperties', {})
              registry_url = properties.get('RegistryUrl')
              keycloak_url = properties.get('KeycloakUrl')
              m2m_secret_arn = properties.get('M2MClientSecretArn')
              canary_path = '/airegistry-tools/'
              max_wait = 540  # 9 minutes (Lambda timeout is 10 min)

              try:
                  # Get M2M token
                  secrets = boto3.client('secretsmanager')
                  m2m_secret = json.loads(
                      secrets.get_secret_value(SecretId=m2m_secret_arn)['SecretString']
                  )
                  client_id = m2m_secret.get('client_id', 'mcp-gateway-m2m')
                  client_secret = m2m_secret.get('client_secret')

                  print(f"Getting M2M token from {keycloak_url}")
                  token = get_m2m_token(keycloak_url, client_id, client_secret)
                  if not token:
                      raise Exception("Failed to get M2M token")
                  print("Got M2M token")

                  # Wait for registry health endpoint
                  print("Waiting for registry to be ready...")
                  ctx = ssl.create_default_context()
                  for i in range(60):
                      try:
                          req = urllib.request.Request(f"{registry_url}/health")
                          with urllib.request.urlopen(req, context=ctx, timeout=10) as response:
                              if response.status == 200:
                                  print(f"Registry ready after {i+1} attempts")
                                  break
                      except Exception as e:
                          if i % 5 == 0:
                              print(f"  Attempt {i+1}: {e}")
                      time.sleep(5)
                  else:
                      raise Exception("Registry not ready after 60 attempts")

                  # Poll airegistry-tools for tool discovery
                  # Uses /api/servers/tools/ which supports JWT Bearer auth (nginx_proxied_auth)
                  # The registry's background reconciliation loop will auto-discover tools
                  # once Service Connect hostnames are resolvable
                  print(f"Polling {canary_path} for tool discovery...")
                  start = time.time()
                  attempt = 0
                  token_refresh_at = time.time() + 240  # Refresh token before 5min expiry
                  while time.time() - start < max_wait:
                      attempt += 1

                      # Refresh M2M token before expiry (tokens last 300s)
                      if time.time() > token_refresh_at:
                          print("  Refreshing M2M token...")
                          token = get_m2m_token(keycloak_url, client_id, client_secret)
                          token_refresh_at = time.time() + 240

                      tools = get_server_tools(registry_url, token, canary_path)
                      if len(tools) > 0:
                          elapsed = int(time.time() - start)
                          print(f"Service Connect healthy: {canary_path} has {len(tools)} tools ({elapsed}s)")
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                              'ToolCount': len(tools),
                              'ElapsedSeconds': elapsed
                          })
                          return

                      print(f"  Attempt {attempt}: no tools yet, waiting for registry reconciliation...")
                      wait = min(20, 5 + attempt * 3)
                      time.sleep(wait)

                  raise Exception(
                      f"Service Connect health check failed: {canary_path} has no "
                      f"tools after {int(time.time() - start)}s. Backend MCP servers "
                      f"may not be reachable via Service Connect."
                  )

              except Exception as e:
                  print(f"Error: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })

  ServiceNetworkHealthCheck:
    Type: Custom::ServiceNetworkHealth
    Properties:
      ServiceToken: !GetAtt ServiceNetworkHealthLambda.Arn
      RegistryUrl: !Ref RegistryUrl
      KeycloakUrl: !Ref KeycloakCloudFrontUrl
      M2MClientSecretArn: !ImportValue
        Fn::Sub: ${EnvironmentName}-KeycloakM2MClientSecretArn
      # Increment to force re-check on stack updates
      Version: '1.0'

  #============================================================================
  # MCP SERVER AND AGENT AUTO-REGISTRATION
  # Registers MCP servers, A2A agents, virtual servers, and skills.
  # Runs after ServiceNetworkHealthCheck confirms Service Connect is working.
  #============================================================================
  MCPRegistrationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-mcp-registration-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MCPRegistrationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: ${EnvironmentName}-KeycloakM2MClientSecretArn

  MCPRegistrationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-mcp-registration
      Description: Auto-register MCP servers, A2A agents, virtual servers, and skills
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MCPRegistrationLambdaRole.Arn
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          """
          Lambda function to auto-register MCP servers, A2A agents, virtual
          servers, and agent skills. Used as a CloudFormation Custom Resource.
          Runs after ServiceNetworkHealthCheck confirms Service Connect works.
          """
          import json
          import urllib.request
          import urllib.parse
          import urllib.error
          import ssl
          import boto3
          import cfnresponse
          import time

          # MCP Servers to register (form data fields for /api/servers/register)
          # Note: /mcpgw/ (MCP Gateway Tools) is NOT registered here because
          # it is redundant with the built-in /airegistry-tools/ server which
          # is auto-registered on startup and points to the same backend.
          MCP_SERVERS = [
              {
                  'name': 'Current Time API',
                  'description': 'A simple API that returns the current server time in various formats.',
                  'path': '/currenttime/',
                  'proxy_pass_url': 'http://currenttime-server:8000/',
                  'tags': 'time,timezone,datetime,api,utility',
                  'num_tools': '1',
                  'is_python': 'true',
                  'license': 'MIT-0'
              },
          ]

          # Servers to register but leave disabled (workshop participants enable these)
          DISABLED_SERVERS = [
              {
                  'name': 'Real Server Fake Tools',
                  'description': 'A collection of fake tools with interesting names for testing.',
                  'path': '/realserverfaketools/',
                  'proxy_pass_url': 'http://realserverfaketools-server:8002/',
                  'tags': 'demo,fake,tools,testing',
                  'num_tools': '6',
                  'is_python': 'true',
                  'license': 'MIT'
              }
          ]

          # Virtual MCP Servers to register (aggregates tools from multiple backends)
          VIRTUAL_SERVERS = [
              {
                  'server_name': 'Dev Tools',
                  'path': '/virtual/dev-tools',
                  'description': 'A curated set of developer utilities combining time lookups and intelligent tool discovery from across the registry.',
                  'tool_mappings': [
                      {
                          'tool_name': 'current_time_by_timezone',
                          'backend_server_path': '/currenttime/',
                      },
                      {
                          'tool_name': 'intelligent_tool_finder',
                          'backend_server_path': '/airegistry-tools/',
                      },
                  ],
                  'tags': ['developer', 'utility', 'curated'],
              }
          ]

          # Agent Skills to register (SKILL.md-based capabilities)
          AGENT_SKILLS = [
              {
                  'name': 'frontend-design',
                  'description': 'Create distinctive, production-grade frontend interfaces with high design quality.',
                  'skill_md_url': 'https://raw.githubusercontent.com/anthropics/skills/refs/heads/main/skills/frontend-design/SKILL.md',
                  'tags': ['design', 'frontend', 'ui'],
              },
              {
                  'name': 'canvas-design',
                  'description': 'Create beautiful visual art in .png and .pdf documents using design philosophy.',
                  'skill_md_url': 'https://raw.githubusercontent.com/anthropics/skills/refs/heads/main/skills/canvas-design/SKILL.md',
                  'tags': ['design', 'canvas', 'art'],
              }
          ]

          # A2A Agents to register
          A2A_AGENTS = [
              {
                  'name': 'Flight Booking Agent',
                  'description': 'Flight booking and reservation management agent',
                  'url': 'http://flight-booking-agent:9000/',
                  'path': '/flight-booking-agent',
                  'protocolVersion': '0.3.0',
                  'version': '0.0.1',
                  'capabilities': {'streaming': True},
                  'defaultInputModes': ['text/plain', 'application/json'],
                  'defaultOutputModes': ['text/plain', 'application/json'],
                  'provider': {'organization': 'MCP Gateway Workshop', 'url': 'https://example.com'},
                  'skills': [
                      {'id': 'check_availability', 'name': 'Check Availability', 'description': 'Check seat availability for a flight.', 'tags': ['flight', 'availability']},
                      {'id': 'reserve_flight', 'name': 'Reserve Flight', 'description': 'Reserve seats on a flight.', 'tags': ['flight', 'reservation']},
                      {'id': 'confirm_booking', 'name': 'Confirm Booking', 'description': 'Confirm and finalize a booking.', 'tags': ['flight', 'confirmation']},
                      {'id': 'process_payment', 'name': 'Process Payment', 'description': 'Process payment (simulated).', 'tags': ['payment']},
                      {'id': 'manage_reservation', 'name': 'Manage Reservation', 'description': 'Update or cancel reservations.', 'tags': ['reservation', 'management']}
                  ],
                  'tags': ['travel', 'flight-booking', 'reservation'],
                  'visibility': 'public',
                  'license': 'MIT'
              },
              {
                  'name': 'Travel Assistant Agent',
                  'description': 'Flight search and trip planning agent',
                  'url': 'http://travel-assistant-agent:9000/',
                  'path': '/travel-assistant-agent',
                  'protocolVersion': '0.3.0',
                  'version': '0.0.1',
                  'capabilities': {'streaming': True},
                  'defaultInputModes': ['text'],
                  'defaultOutputModes': ['text'],
                  'provider': {'organization': 'MCP Gateway Workshop', 'url': 'https://example.com'},
                  'skills': [
                      {'id': 'search_flights', 'name': 'Search Flights', 'description': 'Search for available flights.', 'tags': ['flight', 'search']},
                      {'id': 'check_prices', 'name': 'Check Prices', 'description': 'Get pricing and availability.', 'tags': ['pricing']},
                      {'id': 'get_recommendations', 'name': 'Get Recommendations', 'description': 'Get flight recommendations.', 'tags': ['recommendations']},
                      {'id': 'create_trip_plan', 'name': 'Create Trip Plan', 'description': 'Create a trip planning record.', 'tags': ['planning']}
                  ],
                  'tags': ['travel', 'flight-search', 'trip-planning'],
                  'visibility': 'public',
                  'license': 'MIT'
              }
